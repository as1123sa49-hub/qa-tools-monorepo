[tool.pytest.ini_options]
addopts = "--alluredir=allure-results --tb=short"
testpaths = ["tests"]
asyncio_mode = "auto"

markers = [
    "e2e: 端到端視覺自動化測試",
    "game: game 測試",
]

log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)-5s] [%(category)-8s] %(message)s"
log_cli_date_format = "%H:%M:%S"

# Overridden per run in tests/conftest.py → logs/pytest_YYYYMMDD_HHMMSS.log
log_file = "logs/pytest.log"
log_file_level = "DEBUG"
log_file_format = "%(asctime)s [%(levelname)-5s] [%(category)-8s] %(message)s"
log_file_date_format = "%H:%M:%S"
